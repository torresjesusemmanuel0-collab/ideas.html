<!DOCTYPE html>
<html lang="es">

<head>

<body>

    <!-- Aplicación -->

        <!-- ===================== -->
        <!-- MENSAJE -->
        <!-- ===================== -->

       <section id="final" class="pantalla oculto">

    <div class="tarjeta grande">

    </div>

        </section>

            </div>

                </p>

                Abrir carta secreta 🌸

                </button>
            </div>

        </section>

        <!-- ===================== -->

        <!-- ===================== -->

        <section id="final" class="pantalla oculto">

    <div class="tarjeta grande">
